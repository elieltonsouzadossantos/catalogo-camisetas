  const produtos = [
    { id:1,  nome:'Camiseta Masculina Basica',    desc:'Confortavel, ideal para o dia a dia.',      preco:49.90, cat:'basica',    img:'imagens/camiseta1.jpg',  badge:'novo',   estrelas:4 },
    { id:2,  nome:'Camiseta Polo Masculina',       desc:'Estilo casual e elegante.',                 preco:59.90, cat:'polo',      img:'imagens/camiseta2.jpg',  badge:'top',    estrelas:5 },
    { id:3,  nome:'Camiseta Estampada Masculina',  desc:'Design moderno e descontraido.',            preco:54.90, cat:'estampada', img:'imagens/camiseta3.jpg',  badge:'',       estrelas:4 },
    { id:4,  nome:'Camiseta Slim Fit',             desc:'Modelagem ajustada ao corpo.',              preco:64.90, cat:'especial',  img:'imagens/camiseta4.jpg',  badge:'novo',   estrelas:5 },
    { id:5,  nome:'Camiseta Longline Masculina',   desc:'Estilo urbano e moderno.',                  preco:69.90, cat:'especial',  img:'imagens/camiseta5.jpg',  badge:'',       estrelas:4 },
    { id:6,  nome:'Camiseta Regata Masculina',     desc:'Ideal para dias quentes.',                  preco:39.90, cat:'basica',    img:'imagens/camiseta6.jpg',  badge:'oferta', estrelas:3 },
    { id:7,  nome:'Camiseta Manga Longa',          desc:'Protecao e estilo em dias frios.',          preco:69.90, cat:'especial',  img:'imagens/camiseta7.jpg',  badge:'',       estrelas:4 },
    { id:8,  nome:'Camiseta Henley Masculina',     desc:'Detalhe de botoes na gola.',                preco:74.90, cat:'especial',  img:'imagens/camiseta8.jpg',  badge:'top',    estrelas:5 },
    { id:9,  nome:'Camiseta Oversized Masculina',  desc:'Estilo solto e confortavel.',               preco:59.90, cat:'especial',  img:'imagens/camiseta9.jpg',  badge:'novo',   estrelas:4 },
    { id:10, nome:'Camiseta V-Neck Masculina',     desc:'Decote em V para estilo moderno.',          preco:49.90, cat:'basica',    img:'imagens/camiseta10.jpg', badge:'',       estrelas:3 },
    { id:11, nome:'Camiseta Gola Careca',          desc:'Classica e versatil.',                      preco:44.90, cat:'basica',    img:'imagens/camiseta11.jpg', badge:'',       estrelas:4 },
    { id:12, nome:'Camiseta Dry Fit Masculina',    desc:'Ideal para atividades esportivas.',         preco:79.90, cat:'esportiva', img:'imagens/camiseta12.jpg', badge:'top',    estrelas:5 },
    { id:13, nome:'Camiseta Listrada Masculina',   desc:'Estilo casual com listras.',                preco:59.90, cat:'estampada', img:'imagens/camiseta13.jpg', badge:'',       estrelas:3 },
    { id:14, nome:'Camiseta Premium Masculina',    desc:'Alta qualidade e conforto.',                preco:89.90, cat:'especial',  img:'imagens/camiseta14.jpg', badge:'top',    estrelas:5 },
    { id:15, nome:'Camiseta Casual Masculina',     desc:'Versatil para qualquer ocasiao.',           preco:59.90, cat:'basica',    img:'imagens/camiseta15.jpg', badge:'',       estrelas:4 },
  ];

  let carrinho = [];

  function renderEstrelas(n) {
    return [1,2,3,4,5].map(i => '<span class="estrela' + (i > n ? ' vazia' : '') + '">&#9733;</span>').join('');
  }

  function renderBadge(badge) {
    if (!badge) return '';
    const labels = { novo:'Novo', oferta:'Oferta', top:'Mais Vendido' };
    return '<span class="badge badge-' + badge + '">' + labels[badge] + '</span>';
  }

  function formatarPreco(v) {
    return 'R$ ' + v.toFixed(2).replace('.', ',');
  }

  function renderProdutos(lista) {
    const el = document.getElementById('catalogo');
    document.getElementById('resultado-count').textContent =
      lista.length + ' produto' + (lista.length !== 1 ? 's' : '');
    if (lista.length === 0) {
      el.innerHTML = '<div class="sem-resultado"><p>Nenhum produto encontrado.</p></div>';
      return;
    }
    el.innerHTML = lista.map(function(p) {
      return '<div class="produto" id="prod-' + p.id + '">' +
        renderBadge(p.badge) +
        '<div class="img-wrap" onclick="abrirZoom(\'' + p.img + '\',\'' + p.nome + '\',\'' + formatarPreco(p.preco) + '\')">' +
          '<img src="' + p.img + '" alt="' + p.nome + '" loading="lazy">' +
          '<div class="img-overlay"><span class="zoom-hint">Ampliar imagem</span></div>' +
        '</div>' +
        '<div class="produto-info">' +
          '<h2>' + p.nome + '</h2>' +
          '<div class="estrelas">' + renderEstrelas(p.estrelas) + '</div>' +
          '<p class="produto-desc">' + p.desc + '</p>' +
          '<div class="produto-rodape">' +
            '<span class="preco">' + formatarPreco(p.preco) + '</span>' +
            '<button class="btn-add" id="btn-' + p.id + '" onclick="adicionarCarrinho(' + p.id + ')">+ Carrinho</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function aplicarFiltros() {
    let lista = produtos.slice();
    const busca = document.getElementById('input-busca').value.toLowerCase();
    const cat   = document.getElementById('filtro-categoria').value;
    const preco = document.getElementById('filtro-preco').value;
    const ordem = document.getElementById('filtro-ordem').value;
    if (busca) lista = lista.filter(function(p){ return p.nome.toLowerCase().includes(busca); });
    if (cat)   lista = lista.filter(function(p){ return p.cat === cat; });
    if (preco) {
      var parts = preco.split('-');
      var min = Number(parts[0]), max = Number(parts[1]);
      lista = lista.filter(function(p){ return p.preco >= min && p.preco <= max; });
    }
    if (ordem === 'menor') lista.sort(function(a,b){ return a.preco - b.preco; });
    if (ordem === 'maior') lista.sort(function(a,b){ return b.preco - a.preco; });
    if (ordem === 'nome')  lista.sort(function(a,b){ return a.nome.localeCompare(b.nome); });
    renderProdutos(lista);
  }

  function abrirZoom(src, nome, preco) {
    document.getElementById('zoom-img').src = src;
    document.getElementById('zoom-nome').textContent = nome;
    document.getElementById('zoom-preco').textContent = preco;
    document.getElementById('zoom-overlay').classList.add('ativo');
    document.body.style.overflow = 'hidden';
  }

  function fecharZoom() {
    document.getElementById('zoom-overlay').classList.remove('ativo');
    document.body.style.overflow = '';
  }

  document.getElementById('zoom-img').addEventListener('click', function(e){ e.stopPropagation(); });

  function adicionarCarrinho(id) {
    var p = null;
    for (var i = 0; i < produtos.length; i++) { if (produtos[i].id === id) { p = produtos[i]; break; } }
    var item = null;
    for (var i = 0; i < carrinho.length; i++) { if (carrinho[i].id === id) { item = carrinho[i]; break; } }
    if (item) { item.qty++; } else { carrinho.push({ id:p.id, nome:p.nome, preco:p.preco, qty:1 }); }
    atualizarCarrinho();
    mostrarToast(p.nome + ' adicionado!');
    var btn = document.getElementById('btn-' + id);
    if (btn) {
      btn.textContent = 'Adicionado';
      btn.classList.add('adicionado');
      setTimeout(function(){ btn.textContent = '+ Carrinho'; btn.classList.remove('adicionado'); }, 1800);
    }
  }

  function removerItem(id) {
    carrinho = carrinho.filter(function(x){ return x.id !== id; });
    atualizarCarrinho();
  }

  function alterarQty(id, delta) {
    var item = null;
    for (var i = 0; i < carrinho.length; i++) { if (carrinho[i].id === id) { item = carrinho[i]; break; } }
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) removerItem(id);
    else atualizarCarrinho();
  }

  function atualizarCarrinho() {
    var total = 0, qtd = 0;
    for (var i = 0; i < carrinho.length; i++) { total += carrinho[i].preco * carrinho[i].qty; qtd += carrinho[i].qty; }
    document.getElementById('badge-qtd').textContent = qtd;
    document.getElementById('carrinho-total').textContent = formatarPreco(total);
    var itensEl = document.getElementById('carrinho-itens');
    if (carrinho.length === 0) {
      itensEl.innerHTML = '<div class="carrinho-vazio"><p>Carrinho vazio</p><small>Adicione produtos ao carrinho</small></div>';
      return;
    }
    itensEl.innerHTML = carrinho.map(function(item) {
      return '<div class="item-carrinho">' +
        '<div class="item-carrinho-info">' +
          '<div class="item-carrinho-nome">' + item.nome + '</div>' +
          '<div class="item-carrinho-preco">' + formatarPreco(item.preco) + '</div>' +
          '<div class="item-qty">' +
            '<button onclick="alterarQty(' + item.id + ',-1)">&#8722;</button>' +
            '<span>' + item.qty + '</span>' +
            '<button onclick="alterarQty(' + item.id + ',1)">+</button>' +
          '</div>' +
        '</div>' +
        '<button class="item-remover" onclick="removerItem(' + item.id + ')">&#10005;</button>' +
      '</div>';
    }).join('');
  }

  function abrirCarrinho() {
    document.getElementById('carrinho-overlay').classList.add('ativo');
    document.getElementById('carrinho-panel').classList.add('ativo');
    document.body.style.overflow = 'hidden';
  }

  function fecharCarrinho() {
    document.getElementById('carrinho-overlay').classList.remove('ativo');
    document.getElementById('carrinho-panel').classList.remove('ativo');
    document.body.style.overflow = '';
  }

  function fecharModalNome() {
    document.getElementById('modal-nome-overlay').classList.remove('ativo');
    document.body.style.overflow = '';
  }

  function enviarWhatsApp(nome) {
    var mensagem = '\uD83D\uDED2 *Ola! Gostaria de fazer um pedido:*\n\n';
    mensagem += '\uD83D\uDC64 *Cliente: ' + nome + '*\n\n';
    carrinho.forEach(function(item) {
      mensagem += '\u25AA\uFE0F *' + item.nome + '*\n';
      mensagem += '   Qtd: ' + item.qty + ' x ' + formatarPreco(item.preco) + '\n\n';
    });
    var total = 0;
    carrinho.forEach(function(item){ total += item.preco * item.qty; });
    mensagem += '\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n';
    mensagem += '\uD83D\uDCB0 *Total: ' + formatarPreco(total) + '*\n\n';
    mensagem += 'Aguardo confirmacao. Obrigado!';
    window.location.href = 'https://wa.me/' + MEU_WHATSAPP + '?text=' + encodeURIComponent(mensagem);
  }

  function finalizarPedido() {
    if (carrinho.length === 0) {
      mostrarToast('Seu carrinho esta vazio!');
      return;
    }
    var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    if (isMobile) {
      enviarWhatsApp('Cliente');
    } else {
      var input = document.getElementById('input-nome-cliente');
      input.value = '';
      input.classList.remove('erro');
      document.getElementById('erro-nome').classList.remove('visivel');
      document.getElementById('modal-nome-overlay').classList.add('ativo');
      document.body.style.overflow = 'hidden';
      setTimeout(function(){ input.focus(); }, 100);
    }
  }

  function confirmarPedido() {
    var input = document.getElementById('input-nome-cliente');
    var nome = input.value.trim();
    if (!nome) {
      input.classList.add('erro');
      document.getElementById('erro-nome').classList.add('visivel');
      input.focus();
      return;
    }
    fecharModalNome();
    enviarWhatsApp(nome);
  }

  function mostrarToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2500);
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { fecharZoom(); fecharCarrinho(); fecharModalNome(); }
  });

  renderProdutos(produtos);
  atualizarCarrinho();
</script>
